
version: '3.8'

networks:
  liquid_hive_dev:
    driver: bridge

volumes:
  qdrant_dev_data:
  elasticsearch_dev_data:

services:
  # Development Database
  postgres_dev:
    image: postgres:15-alpine
    container_name: liquid_hive_postgres_dev
    environment:
      POSTGRES_DB: liquid_hive_dev
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
    volumes:
      - ./data/postgres_dev:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - liquid_hive_dev

  # Development Vector Database
  qdrant_dev:
    image: qdrant/qdrant:latest
    container_name: liquid_hive_qdrant_dev
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    volumes:
      - qdrant_dev_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - liquid_hive_dev

  # Development Search Engine
  elasticsearch_dev:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    container_name: liquid_hive_elasticsearch_dev
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    volumes:
      - elasticsearch_dev_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - liquid_hive_dev

  # Single vLLM instance for development
  vllm_dev:
    image: vllm/vllm-openai:latest
    container_name: liquid_hive_vllm_dev
    environment:
      - MODEL=${DEV_MODEL:-microsoft/DialoGPT-small}
      - HF_TOKEN=${HF_TOKEN}
    ports:
      - "8001:8000"
    networks:
      - liquid_hive_dev

  # Development API
  api_dev:
    build:
      context: ./full_build_hive_deepseek/full_build_upgraded/full_build
      dockerfile: Dockerfile.dev
    container_name: liquid_hive_api_dev
    environment:
      - DATABASE_URL=postgresql://dev_user:dev_password@postgres_dev:5432/liquid_hive_dev
      - VLLM_TIER1_URL=http://vllm_dev:8000
      - QDRANT_URL=http://qdrant_dev:6333
      - ELASTICSEARCH_URL=http://elasticsearch_dev:9200
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - LOG_LEVEL=DEBUG
      - ENVIRONMENT=development
    volumes:
      - ./full_build_hive_deepseek/full_build_upgraded/full_build:/app:ro
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - liquid_hive_dev
    depends_on:
      - postgres_dev
      - qdrant_dev
      - elasticsearch_dev
      - vllm_dev
    command: ["python", "-m", "uvicorn", "full_build.service.api:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  # Development Frontend
  frontend_dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: liquid_hive_frontend_dev
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    networks:
      - liquid_hive_dev
    depends_on:
      - api_dev
