
apiVersion: apps/v1
kind: Deployment
metadata:
  name: liquid-hive-api
  namespace: liquid-hive
spec:
  replicas: 3
  selector:
    matchLabels:
      app: liquid-hive-api
  template:
    metadata:
      labels:
        app: liquid-hive-api
    spec:
      containers:
      - name: api
        image: liquid-hive-api:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: liquid-hive-config
        - secretRef:
            name: liquid-hive-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: liquid-hive-api-service
  namespace: liquid-hive
spec:
  selector:
    app: liquid-hive-api
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: liquid-hive-api-hpa
  namespace: liquid-hive
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: liquid-hive-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
