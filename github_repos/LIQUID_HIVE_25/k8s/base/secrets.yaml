
apiVersion: v1
kind: Secret
metadata:
  name: liquid-hive-secrets
  namespace: liquid-hive
type: Opaque
stringData:
  # Database Credentials
  POSTGRES_USER: "liquid_hive"
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # JWT Secret
  JWT_SECRET_KEY: "CHANGE_ME_IN_PRODUCTION_USE_STRONG_SECRET"
  
  # DeepSeek API Key (if using external API)
  DEEPSEEK_API_KEY: "CHANGE_ME_IF_USING_DEEPSEEK"
  
  # Redis Password (if enabled)
  REDIS_PASSWORD: ""
