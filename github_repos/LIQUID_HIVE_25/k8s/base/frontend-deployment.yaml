
apiVersion: apps/v1
kind: Deployment
metadata:
  name: liquid-hive-frontend
  namespace: liquid-hive
spec:
  replicas: 2
  selector:
    matchLabels:
      app: liquid-hive-frontend
  template:
    metadata:
      labels:
        app: liquid-hive-frontend
    spec:
      containers:
      - name: frontend
        image: liquid-hive-frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://liquid-hive-api-service:8000"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: liquid-hive-frontend-service
  namespace: liquid-hive
spec:
  selector:
    app: liquid-hive-frontend
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
