
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: liquid-hive-ingress
  namespace: liquid-hive
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - liquid-hive.example.com
    secretName: liquid-hive-tls
  rules:
  - host: liquid-hive.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: liquid-hive-api-service
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: liquid-hive-frontend-service
            port:
              number: 3000
