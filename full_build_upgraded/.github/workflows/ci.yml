name: CI
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
    - name: Install dependencies
      run: |
        cd full_build_upgraded/full_build
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run backend tests
      run: |
        cd full_build_upgraded/full_build
        pytest tests/ -v --tb=short
      env:
        RETRIEVAL_MODE: disabled
        PRIMARY_MODEL_URL: http://mock-model:8000
    - name: Run pyflakes linting
      run: |
        cd full_build_upgraded/full_build
        python -m pyflakes .
  
  frontend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: full_build_upgraded/gui/package-lock.json
    - name: Install frontend dependencies
      working-directory: full_build_upgraded/gui
      run: npm ci
    - name: Run frontend linting
      working-directory: full_build_upgraded/gui
      run: npm run lint
    - name: Build frontend
      working-directory: full_build_upgraded/gui
      run: npm run build
    - name: Run frontend tests
      working-directory: full_build_upgraded/gui
      run: npm test -- --passWithNoTests
