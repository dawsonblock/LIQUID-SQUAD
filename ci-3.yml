name: CI

on:
  pull_request:
    branches: [ main, master, develop ]
  push:
    branches: [ develop ]

jobs:
  backend-frontend-ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hive
          POSTGRES_PASSWORD: hive
          POSTGRES_DB: hive_ci
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd="pg_isready -U hive" --health-interval=10s --health-timeout=5s --health-retries=5
      qdrant:
        image: qdrant/qdrant:latest
        ports: [ "6333:6333" ]
        options: >-
          --health-cmd="wget -qO- http://localhost:6333/healthz || exit 1" --health-interval=10s --health-timeout=5s --health-retries=10
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"
        ports: [ "9200:9200" ]
        options: >-
          --health-cmd="wget -qO- http://localhost:9200 || exit 1" --health-interval=10s --health-timeout=5s --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json

      - name: Python cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f full_build_hive_deepseek/full_build_upgraded/requirements.txt ]; then pip install -r full_build_hive_deepseek/full_build_upgraded/requirements.txt; fi

      - name: Backend tests
        env:
          DATABASE_URL: postgresql://hive:hive@localhost:5432/hive_ci
          QDRANT_URL: http://localhost:6333
          ELASTICSEARCH_URL: http://localhost:9200
        run: |
          pytest -q

      - name: Frontend install
        working-directory: frontend
        run: |
          npm ci

      - name: Frontend unit tests
        working-directory: frontend
        run: |
          npm test --if-present -- --ci --reporters=default --reporters=jest-junit || true

      - name: Frontend build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: |
          npm run build
