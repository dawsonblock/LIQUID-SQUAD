name: CI

on:
  pull_request:
    branches: [ main, master, develop ]
  push:
    branches: [ develop ]

jobs:
  backend-frontend-ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hive
          POSTGRES_PASSWORD: hive
          POSTGRES_DB: hive_ci
        ports:
          --health-cmd="pg_isready -U hive" --health-interval=10s --health-timeout=5s --health-retries=5 --health-start-period=20s
        ports:
          - 5432:5432
      qdrant:
        image: qdrant/qdrant:latest
        options: >-
          --health-cmd="sh -c 'apk add --no-cache curl >/dev/null 2>&1 || true; curl -fsS http://localhost:6333/healthz || exit 1'" --health-interval=10s --health-timeout=5s --health-retries=10 --health-start-period=30s
        ports:
          - 6333:6333
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"
        options: >-
          --health-cmd="sh -c 'curl -fsS http://localhost:9200 >/dev/null || exit 1'" --health-interval=10s --health-timeout=5s --health-retries=10 --health-start-period=60s
        ports:
          - 9200:9200
      - name: Frontend build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: |
          npm run build
