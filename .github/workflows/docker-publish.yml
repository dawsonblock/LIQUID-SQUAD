name: Docker Publish

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_API: ${{ toLower(github.repository) }}-api
  IMAGE_NAME_FE: ${{ toLower(github.repository) }}-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (API)
        id: meta_api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: ./full_build_upgraded/full_build
          file: ./full_build_upgraded/full_build/Dockerfile
          push: true
          tags: ${{ steps.meta_api.outputs.tags }}
          labels: ${{ steps.meta_api.outputs.labels }}

      - name: Extract metadata (Frontend)
        id: meta_fe
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FE }}

      - name: Setup Node.js for frontend build
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: full_build_upgraded/gui/package-lock.json

      - name: Create frontend Dockerfile
        run: |
          cat > full_build_upgraded/gui/Dockerfile << 'EOF'
          FROM node:20-alpine AS base
          
          FROM base AS deps
          RUN apk add --no-cache libc6-compat
          WORKDIR /app
          COPY package*.json ./
          RUN npm ci
          
          FROM base AS builder
          WORKDIR /app
          COPY --from=deps /app/node_modules ./node_modules
          COPY . .
          RUN npm run build
          
          FROM base AS runner
          WORKDIR /app
          ENV NODE_ENV=production
          RUN addgroup --system --gid 1001 nodejs
          RUN adduser --system --uid 1001 nextjs
          COPY --from=builder /app/public ./public
          COPY --from=builder --chown=nextjs:nodejs /app/.next/standalone ./
          COPY --from=builder --chown=nextjs:nodejs /app/.next/static ./.next/static
          USER nextjs
          EXPOSE 3000
          ENV PORT=3000
          CMD ["node", "server.js"]
          EOF

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./full_build_upgraded/gui
          file: ./full_build_upgraded/gui/Dockerfile
          push: true
          tags: ${{ steps.meta_fe.outputs.tags }}
          labels: ${{ steps.meta_fe.outputs.labels }}
